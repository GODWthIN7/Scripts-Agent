name: Python CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile-check all Python source files
        run: python -m compileall -q .

      - name: Smoke-test CLI help
        run: python main.py --help

      - name: Smoke-test --list-files
        run: python main.py --list-files
